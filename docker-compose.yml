version: '3.8'
services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "3000"

  nigix:
    image: nginx:latest
    container_name: nginx 
    ports:
      - "5555:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
